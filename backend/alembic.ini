[alembic]
script_location = %(here)s/migrations
prepend_sys_path = %(here)s
# Migration filenames sort chronologically: 2026_07_13_1430-a1b2c3_add_expenses.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
# sqlalchemy.url is intentionally absent — env.py reads it from app.config so
# there is exactly one source of truth (DATABASE_URL) for app and migrations.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
